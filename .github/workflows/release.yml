name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  preflight:
    name: Verify release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag and main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - name: Verify stable tag matches project version and main
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          project_version=$(uv run --no-project --python 3.13 python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          tag_version=${RELEASE_TAG#v}
          test "$tag_version" = "$project_version" || {
            echo "Tag version $tag_version does not match project version $project_version"
            exit 1
          }
          if [[ ! "$project_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Production releases require a stable X.Y.Z version, got $project_version"
            exit 1
          fi
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD || {
            echo "Release tag must point to a commit already merged into main"
            exit 1
          }

  build:
    name: Build distributions
    needs: preflight
    uses: ./.github/workflows/verify.yml
    with:
      python-version: "3.13"
      build-package: true
      upload-artifact: true
      artifact-name: release-dists

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/prometheus-tornado-instrumentator
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
