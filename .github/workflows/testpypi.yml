name: Publish to TestPyPI

on:
  push:
    tags:
      - "test-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"

      - name: Verify tag matches project version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          project_version=$(uv run --no-project --python 3.13 python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          tag_version=${RELEASE_TAG#test-v}
          test "$tag_version" = "$project_version" || {
            echo "Tag version $tag_version does not match project version $project_version"
            exit 1
          }

      - name: Run tests
        run: uv run --extra dev python -m pytest -q

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uv run --extra dev python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish distributions to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/prometheus-tornado-instrumentator
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: release-dists
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
