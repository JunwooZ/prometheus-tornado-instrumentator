name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    uses: ./.github/workflows/verify.yml
    with:
      python-version: ${{ matrix.python-version }}

  coverage-and-package:
    name: Coverage and package
    uses: ./.github/workflows/verify.yml
    with:
      python-version: "3.13"
      run-coverage: true
      build-package: true
